<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS — Command Center | ScriptMasterLabs</title>
    <meta name="description" content="ARGUS Command Center — Real-time market intelligence organism. See the hidden market state before the move becomes obvious.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── CSS Reset & Variables ─────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-primary: #06060E;
            --bg-secondary: #0D0D1A;
            --bg-card: #111128;
            --bg-card-hover: #16163A;
            --bg-glass: rgba(17, 17, 40, 0.7);
            --border: rgba(255, 255, 255, 0.06);
            --border-active: rgba(204, 68, 255, 0.3);
            --text-primary: #E8E8F0;
            --text-secondary: #8888AA;
            --text-muted: #555577;
            --accent-primary: #CC44FF;
            --accent-secondary: #5B8CFF;
            --accent-glow: rgba(204, 68, 255, 0.15);
            --green: #00FF88;
            --amber: #FFD700;
            --red: #FF3030;
            --orange: #FF6600;
            --pink: #FF0080;
            --violet: #CC44FF;
            --blue: #5B8CFF;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 30px rgba(204, 68, 255, 0.08);
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Ambient Background ───────────────────────────────────────────── */
        .ambient-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: 
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(204, 68, 255, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 80% 90%, rgba(91, 140, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0, 255, 136, 0.015) 0%, transparent 40%);
        }

        /* ── Scan Lines Effect ────────────────────────────────────────────── */
        .scan-lines {
            position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.015;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
        }

        /* ── Layout ───────────────────────────────────────────────────────── */
        .app { position: relative; z-index: 2; }
        
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            background: rgba(6, 6, 14, 0.8);
            position: sticky; top: 0; z-index: 100;
        }

        .header-brand {
            display: flex; align-items: center; gap: 12px;
        }

        .logo-mark {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800;
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(204, 68, 255, 0.3); }
            50% { box-shadow: 0 0 20px 4px rgba(204, 68, 255, 0.15); }
        }

        .logo-text { font-weight: 800; font-size: 18px; letter-spacing: 2px; }
        .logo-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; }

        .header-status {
            display: flex; align-items: center; gap: 16px;
        }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: statusBlink 2s ease-in-out infinite;
        }

        @keyframes statusBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-text { font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); }

        /* ── Search Bar ───────────────────────────────────────────────────── */
        .search-container {
            padding: 20px 24px;
            display: flex; gap: 12px; align-items: center;
        }

        .search-input {
            flex: 1; max-width: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 15px; font-family: var(--font-mono);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-input::placeholder { color: var(--text-muted); }

        .btn {
            padding: 12px 24px;
            border-radius: var(--radius);
            font-family: var(--font-main);
            font-weight: 600; font-size: 14px;
            cursor: pointer; border: none;
            transition: all 0.2s;
            position: relative; overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(204, 68, 255, 0.3);
        }

        .btn-primary:active { transform: translateY(0); }

        .btn-primary:disabled {
            opacity: 0.5; cursor: not-allowed; transform: none;
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        /* ── Main Grid ────────────────────────────────────────────────────── */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            padding: 0 24px 24px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            border-color: var(--border-active);
            box-shadow: var(--shadow-glow);
        }

        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 12px; font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 1.5px; text-transform: uppercase;
        }

        .card-badge {
            font-size: 10px; font-weight: 600;
            padding: 3px 8px; border-radius: 20px;
            letter-spacing: 0.5px;
        }

        /* ── Veil Gauge ───────────────────────────────────────────────────── */
        .gauge-container { grid-column: 1; }
        
        .gauge-wrap {
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 0;
        }

        .gauge-svg { width: 220px; height: 130px; }

        .gauge-value {
            font-size: 48px; font-weight: 800;
            font-family: var(--font-mono);
            margin-top: -8px;
            background: linear-gradient(135deg, var(--accent-primary), var(--text-primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gauge-label {
            font-size: 13px; color: var(--text-secondary);
            margin-top: 4px; font-weight: 500;
        }

        .gauge-state {
            font-size: 14px; font-weight: 700;
            padding: 4px 16px; border-radius: 20px;
            margin-top: 12px; letter-spacing: 1px;
        }

        /* ── Agent Radar ──────────────────────────────────────────────────── */
        .radar-container { grid-column: 2; }
        
        .radar-svg { width: 100%; max-width: 280px; margin: 0 auto; display: block; }

        .radar-label {
            font-size: 11px; font-family: var(--font-mono);
            fill: var(--text-secondary);
        }

        .radar-grid { stroke: var(--border); stroke-width: 0.5; fill: none; }
        
        .radar-shape {
            fill: rgba(204, 68, 255, 0.15);
            stroke: var(--accent-primary);
            stroke-width: 2;
            transition: all 0.6s ease;
        }

        .radar-dot {
            fill: var(--accent-primary);
            filter: drop-shadow(0 0 4px var(--accent-primary));
        }

        /* ── Status Panel ─────────────────────────────────────────────────── */
        .status-panel { grid-column: 3; }

        .status-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .status-row:last-child { border-bottom: none; }

        .status-key {
            font-size: 12px; color: var(--text-muted);
            letter-spacing: 0.5px; text-transform: uppercase;
        }

        .status-val {
            font-size: 14px; font-weight: 600;
            font-family: var(--font-mono);
        }

        .status-val.bullish { color: var(--green); }
        .status-val.bearish { color: var(--red); }
        .status-val.unstable { color: var(--amber); }
        .status-val.fractured { color: var(--violet); }
        .status-val.neutral { color: var(--text-secondary); }
        .status-val.stable { color: var(--green); }
        .status-val.fragile { color: var(--amber); }
        .status-val.distorted { color: var(--violet); }
        .status-val.breaking { color: var(--red); }

        /* ── Event Risk Bars ──────────────────────────────────────────────── */
        .risk-bar-wrap {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 8px;
        }

        .risk-label {
            font-size: 11px; color: var(--text-muted);
            width: 80px; text-align: right;
            font-family: var(--font-mono);
        }

        .risk-track {
            flex: 1; height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px; overflow: hidden;
        }

        .risk-fill {
            height: 100%; border-radius: 3px;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .risk-pct {
            font-size: 11px; color: var(--text-secondary);
            width: 40px; font-family: var(--font-mono);
        }

        /* ── Briefing Panel ───────────────────────────────────────────────── */
        .briefing-panel {
            grid-column: 1 / -1;
        }

        .briefing-text {
            font-size: 14px; line-height: 1.75;
            color: var(--text-secondary);
            font-style: italic;
            padding: 12px 16px;
            border-left: 3px solid var(--accent-primary);
            background: rgba(204, 68, 255, 0.03);
            border-radius: 0 var(--radius) var(--radius) 0;
        }

        /* ── Agent Detail Grid ────────────────────────────────────────────── */
        .agent-grid {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .agent-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
        }

        .agent-card:hover {
            border-color: var(--border-active);
            transform: translateY(-2px);
        }

        .agent-name {
            font-size: 11px; color: var(--text-muted);
            letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 8px;
        }

        .agent-score {
            font-size: 28px; font-weight: 800;
            font-family: var(--font-mono);
        }

        .agent-bar {
            width: 100%; height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px; margin-top: 10px;
            overflow: hidden;
        }

        .agent-bar-fill {
            height: 100%; border-radius: 2px;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .agent-thesis {
            font-size: 11px; color: var(--text-muted);
            margin-top: 8px; line-height: 1.4;
        }

        /* ── Timeline ─────────────────────────────────────────────────────── */
        .timeline-panel {
            grid-column: 1 / -1;
        }

        .timeline-container {
            overflow-x: auto;
            padding: 10px 0;
        }

        .timeline-chart {
            display: flex; align-items: flex-end;
            gap: 2px; min-width: 100%;
            height: 120px;
        }

        .timeline-bar {
            flex: 1; min-width: 6px;
            border-radius: 3px 3px 0 0;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .timeline-bar:hover {
            opacity: 0.8;
            transform: scaleY(1.05);
            transform-origin: bottom;
        }

        .timeline-bar:hover::after {
            content: attr(data-tooltip);
            position: absolute; bottom: 105%;
            left: 50%; transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 4px 8px; border-radius: 6px;
            font-size: 10px; white-space: nowrap;
            color: var(--text-primary);
            z-index: 10;
        }

        /* ── Trigger Map ──────────────────────────────────────────────────── */
        .trigger-panel { grid-column: 1 / 3; }

        .trigger-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 0;
            font-size: 13px;
        }

        .trigger-icon {
            width: 24px; height: 24px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
        }

        .trigger-text { color: var(--text-secondary); }
        .trigger-value { color: var(--text-primary); font-weight: 600; font-family: var(--font-mono); margin-left: auto; }

        /* ── Debate Viewer ────────────────────────────────────────────────── */
        .debate-panel { grid-column: 3; }

        .debate-log {
            max-height: 200px; overflow-y: auto;
            font-size: 12px; font-family: var(--font-mono);
            color: var(--text-muted);
            line-height: 1.8;
        }

        .debate-log::-webkit-scrollbar { width: 4px; }
        .debate-log::-webkit-scrollbar-track { background: transparent; }
        .debate-log::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

        .debate-agent { color: var(--accent-primary); font-weight: 600; }
        .debate-vote { font-weight: 500; }
        .debate-vote.agree { color: var(--green); }
        .debate-vote.disagree { color: var(--red); }

        /* ── Empty State ──────────────────────────────────────────────────── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 64px; margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 22px; font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-sub {
            font-size: 14px; color: var(--text-muted);
        }

        /* ── Loading Animation ────────────────────────────────────────────── */
        .loading-ring {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid transparent;
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .scanning-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(6, 6, 14, 0.85);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }

        .scanning-text {
            font-size: 14px; color: var(--text-secondary);
            margin-top: 16px; font-family: var(--font-mono);
            letter-spacing: 2px;
        }

        .scanning-ring {
            width: 48px; height: 48px;
            border: 3px solid transparent;
            border-top-color: var(--accent-primary);
            border-right-color: var(--accent-secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* ── Footer ───────────────────────────────────────────────────────── */
        .footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .footer-text { font-size: 11px; color: var(--text-muted); }
        .footer-brand { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }

        /* ── Responsive ───────────────────────────────────────────────────── */
        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr 1fr; }
            .gauge-container { grid-column: 1; }
            .radar-container { grid-column: 2; }
            .status-panel { grid-column: 1 / -1; }
            .agent-grid { grid-template-columns: repeat(3, 1fr); }
            .briefing-panel, .timeline-panel, .trigger-panel, .debate-panel { grid-column: 1 / -1; }
        }

        @media (max-width: 640px) {
            .main-grid { grid-template-columns: 1fr; }
            .gauge-container, .radar-container, .status-panel { grid-column: 1; }
            .agent-grid { grid-template-columns: repeat(2, 1fr); }
            .header { padding: 12px 16px; }
            .search-container { padding: 16px; flex-wrap: wrap; }
            .search-input { max-width: 100%; }
        }

        /* ── Animations ───────────────────────────────────────────────────── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.4s ease-out forwards;
            opacity: 0;
        }

        .delay-1 { animation-delay: 0.05s; }
        .delay-2 { animation-delay: 0.1s; }
        .delay-3 { animation-delay: 0.15s; }
        .delay-4 { animation-delay: 0.2s; }
        .delay-5 { animation-delay: 0.25s; }
        .delay-6 { animation-delay: 0.3s; }
        .delay-7 { animation-delay: 0.35s; }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="scan-lines"></div>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <div class="logo-mark">⚡</div>
                <div>
                    <div class="logo-text">ARGUS</div>
                    <div class="logo-sub">Command Center</div>
                </div>
            </div>
            <div class="header-status">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">ORGANISM ONLINE</span>
            </div>
        </header>

        <!-- Search -->
        <div class="search-container">
            <input type="text" class="search-input" id="tickerInput" placeholder="Enter ticker (e.g. AMC, SPY, TSLA)" autocomplete="off" spellcheck="false" maxlength="10">
            <button class="btn btn-primary" id="scanBtn" onclick="runScan()">
                <span id="scanBtnText">⚡ SCAN</span>
            </button>
            <button class="btn btn-secondary" id="historyBtn" onclick="loadHistory()" style="display:none;">📜 History</button>
        </div>

        <!-- Main Content Grid -->
        <div class="main-grid" id="mainGrid">
            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">👁️</div>
                <div class="empty-title">100 Eyes. Waiting.</div>
                <div class="empty-sub">Enter a ticker above to engage the organism.</div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <span class="footer-text">SML ARGUS v0.2.0 — Phase 2: Pine Chart Surface</span>
            <span class="footer-brand">© ScriptMasterLabs</span>
        </footer>
    </div>

    <!-- Scanning Overlay -->
    <div class="scanning-overlay" id="scanningOverlay" style="display:none;">
        <div class="scanning-ring"></div>
        <div class="scanning-text" id="scanningText">SCANNING...</div>
    </div>

    <script>
        // ── State ────────────────────────────────────────────────────────────
        let currentData = null;
        let currentTicker = '';
        let isScanning = false;

        // ── Colors ───────────────────────────────────────────────────────────
        const COLORS = {
            dormant: '#4A4A6A', watching: '#5B8CFF', building: '#44BB77',
            tension: '#E8A020', escalation: '#FF6600', armed: '#FF3030',
            triggered: '#FF0080', distorted: '#CC44FF', failure: '#FF4400',
            trap: '#FF4400', cooldown: '#4A4A6A',
            bullish: '#00FF88', unstable_bullish: '#FFD700',
            bearish: '#FF3030', unstable_bearish: '#FF6600',
            neutral: '#8888AA', fractured: '#CC44FF',
            stable: '#00FF88', fragile: '#FFD700',
            breaking: '#FF3030',
        };

        const BIAS_EMOJI = {
            bullish: '🟢', unstable_bullish: '🟡',
            bearish: '🔴', unstable_bearish: '🟠',
            neutral: '⬜', fractured: '🔀',
        };

        const STABILITY_EMOJI = {
            stable: '✅', fragile: '⚠️', distorted: '🌀', breaking: '💥',
        };

        // ── Keyboard shortcut ────────────────────────────────────────────────
        document.getElementById('tickerInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') runScan();
        });

        // ── API Calls ────────────────────────────────────────────────────────
        async function runScan() {
            const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
            if (!ticker || isScanning) return;

            isScanning = true;
            currentTicker = ticker;
            showScanning(ticker);

            try {
                const resp = await fetch('/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticker, timeframes: ['15m', '1h', '1d'] }),
                });

                if (!resp.ok) throw new Error(`Scan failed: ${resp.status}`);
                currentData = await resp.json();
                renderDashboard(currentData);
                document.getElementById('historyBtn').style.display = '';
            } catch (err) {
                console.error(err);
                showError(err.message);
            } finally {
                isScanning = false;
                hideScanning();
            }
        }

        async function loadHistory() {
            if (!currentTicker) return;
            try {
                const resp = await fetch(`/replay/${currentTicker}?limit=50`);
                if (!resp.ok) return;
                const history = await resp.json();
                renderTimeline(history);
            } catch (err) {
                console.error('History load failed:', err);
            }
        }

        // ── Scanning Overlay ─────────────────────────────────────────────────
        function showScanning(ticker) {
            const overlay = document.getElementById('scanningOverlay');
            const text = document.getElementById('scanningText');
            overlay.style.display = 'flex';
            let dots = 0;
            const phases = [
                `FETCHING MARKET DATA — ${ticker}`,
                `RUNNING 5-AGENT ANALYSIS`,
                `ECHO FORGE MODULATION`,
                `DEBATE ENGINE RESOLVING`,
                `GENERATING NARRATIVE`,
            ];
            let phase = 0;
            const interval = setInterval(() => {
                dots = (dots + 1) % 4;
                text.textContent = phases[phase % phases.length] + '.'.repeat(dots);
                if (dots === 0) phase++;
            }, 400);
            overlay._interval = interval;
        }

        function hideScanning() {
            const overlay = document.getElementById('scanningOverlay');
            clearInterval(overlay._interval);
            overlay.style.display = 'none';
        }

        function showError(msg) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <div class="empty-title">Scan Failed</div>
                    <div class="empty-sub">${msg}</div>
                </div>
            `;
        }

        // ── Render Dashboard ─────────────────────────────────────────────────
        function renderDashboard(data) {
            const grid = document.getElementById('mainGrid');
            const stateColor = COLORS[data.state] || COLORS.dormant;
            const biasColor = COLORS[data.bias] || COLORS.neutral;
            const stabilityColor = COLORS[data.stability] || COLORS.stable;
            const biasEmoji = BIAS_EMOJI[data.bias] || '⬜';
            const stabEmoji = STABILITY_EMOJI[data.stability] || '';

            const agents = data.agents || [];
            const agentMap = {};
            agents.forEach(a => agentMap[a.name] = a);

            const eventRisk = data.event_risk || {};
            const triggerMap = data.trigger_map || {};

            grid.innerHTML = `
                <!-- Veil Gauge -->
                <div class="card gauge-container animate-in delay-1">
                    <div class="card-header">
                        <span class="card-title">Veil Score</span>
                        <span class="card-badge" style="background:${stateColor}22;color:${stateColor}">${data.state?.toUpperCase() || 'UNKNOWN'}</span>
                    </div>
                    <div class="gauge-wrap">
                        ${renderGaugeSVG(data.veil_score, stateColor)}
                        <div class="gauge-value">${data.veil_score?.toFixed(1) || '0.0'}</div>
                        <div class="gauge-label">Hidden State Intensity</div>
                        <div class="gauge-state" style="background:${stateColor}22;color:${stateColor}">
                            ${data.state?.toUpperCase().replace('_', ' ') || '—'}
                        </div>
                    </div>
                </div>

                <!-- Agent Radar -->
                <div class="card radar-container animate-in delay-2">
                    <div class="card-header">
                        <span class="card-title">Agent Consensus</span>
                        <span class="card-badge" style="background:rgba(204,68,255,0.1);color:#CC44FF">5 AGENTS</span>
                    </div>
                    ${renderRadarSVG(agents)}
                </div>

                <!-- Status Panel -->
                <div class="card status-panel animate-in delay-3">
                    <div class="card-header">
                        <span class="card-title">Intelligence Summary</span>
                        <span class="card-badge" style="background:rgba(91,140,255,0.1);color:#5B8CFF">${data.ticker}</span>
                    </div>
                    <div class="status-row">
                        <span class="status-key">Pressure Bias</span>
                        <span class="status-val" style="color:${biasColor}">${biasEmoji} ${(data.bias || 'neutral').replace('_', ' ').toUpperCase()}</span>
                    </div>
                    <div class="status-row">
                        <span class="status-key">Stability</span>
                        <span class="status-val" style="color:${stabilityColor}">${stabEmoji} ${(data.stability || 'stable').toUpperCase()}</span>
                    </div>
                    <div class="status-row">
                        <span class="status-key">Alert Mode</span>
                        <span class="status-val" style="color:${stateColor}">${(data.alert_mode || 'observation').replace('_', ' ').toUpperCase()}</span>
                    </div>
                    <div class="status-row">
                        <span class="status-key">Memory Match</span>
                        <span class="status-val" style="color:${data.memory_matched ? '#00FF88' : '#555577'}">${data.memory_matched ? '🧠 YES' : 'NO'}</span>
                    </div>
                    <div class="status-row">
                        <span class="status-key">Data Source</span>
                        <span class="status-val neutral">${(data.data_source || 'yfinance').toUpperCase()}</span>
                    </div>
                    <div class="status-row">
                        <span class="status-key">Scanned</span>
                        <span class="status-val neutral" style="font-size:11px">${formatTime(data.scanned_at)}</span>
                    </div>
                </div>

                <!-- Briefing -->
                <div class="card briefing-panel animate-in delay-4">
                    <div class="card-header">
                        <span class="card-title">📡 Narrative Briefing</span>
                    </div>
                    <div class="briefing-text">${data.briefing || 'No briefing generated.'}</div>
                </div>

                <!-- Agent Detail Grid -->
                <div class="agent-grid animate-in delay-5">
                    ${renderAgentCards(agents)}
                </div>

                <!-- Event Risk -->
                <div class="card animate-in delay-6" style="grid-column: 1 / -1;">
                    <div class="card-header">
                        <span class="card-title">⚡ Event Risk Assessment</span>
                        <span class="card-badge" style="background:rgba(255,102,0,0.1);color:#FF6600">${(eventRisk.dominant || 'NONE').toUpperCase()}</span>
                    </div>
                    ${renderRiskBars(eventRisk)}
                </div>

                <!-- Trigger Map + Debate -->
                <div class="card trigger-panel animate-in delay-7">
                    <div class="card-header">
                        <span class="card-title">🎯 Trigger Map</span>
                    </div>
                    ${renderTriggerMap(triggerMap)}
                </div>

                <div class="card debate-panel animate-in delay-7">
                    <div class="card-header">
                        <span class="card-title">⚖️ Debate Transcript</span>
                    </div>
                    <div class="debate-log">
                        ${renderDebateLog(agents, data)}
                    </div>
                </div>

                <!-- Timeline placeholder -->
                <div class="card timeline-panel animate-in delay-7" id="timelinePanel" style="display:none">
                    <div class="card-header">
                        <span class="card-title">📈 State Timeline</span>
                    </div>
                    <div class="timeline-container" id="timelineContainer"></div>
                </div>
            `;
        }

        // ── SVG Gauge ────────────────────────────────────────────────────────
        function renderGaugeSVG(score, color) {
            const pct = Math.max(0, Math.min(100, score)) / 100;
            const angle = -135 + pct * 270;  // -135 to +135
            const r = 80;
            const cx = 110, cy = 100;
            
            // Arc path
            const startAngle = -135 * Math.PI / 180;
            const endAngle = angle * Math.PI / 180;
            const x1 = cx + r * Math.cos(startAngle);
            const y1 = cy + r * Math.sin(startAngle);
            const x2 = cx + r * Math.cos(endAngle);
            const y2 = cy + r * Math.sin(endAngle);
            const largeArc = (angle + 135) > 180 ? 1 : 0;

            // Needle
            const nx = cx + (r - 10) * Math.cos(endAngle);
            const ny = cy + (r - 10) * Math.sin(endAngle);

            return `
                <svg class="gauge-svg" viewBox="0 0 220 130">
                    <!-- Track -->
                    <path d="${describeArc(cx, cy, r, -135, 135)}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="12" stroke-linecap="round"/>
                    <!-- Fill -->
                    <path d="${describeArc(cx, cy, r, -135, angle)}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
                    <!-- Glow -->
                    <path d="${describeArc(cx, cy, r, -135, angle)}" fill="none" stroke="${color}" stroke-width="16" stroke-linecap="round" opacity="0.15" filter="blur(4px)"/>
                    <!-- Needle dot -->
                    <circle cx="${nx}" cy="${ny}" r="5" fill="${color}" filter="drop-shadow(0 0 6px ${color})"/>
                    <!-- Center -->
                    <circle cx="${cx}" cy="${cy}" r="4" fill="rgba(255,255,255,0.1)"/>
                    <!-- Labels -->
                    <text x="25" y="125" fill="#555577" font-size="10" font-family="Inter">0</text>
                    <text x="190" y="125" fill="#555577" font-size="10" font-family="Inter">100</text>
                </svg>
            `;
        }

        function describeArc(cx, cy, r, startDeg, endDeg) {
            const startRad = startDeg * Math.PI / 180;
            const endRad = endDeg * Math.PI / 180;
            const x1 = cx + r * Math.cos(startRad);
            const y1 = cy + r * Math.sin(startRad);
            const x2 = cx + r * Math.cos(endRad);
            const y2 = cy + r * Math.sin(endRad);
            const diff = endDeg - startDeg;
            const largeArc = diff > 180 ? 1 : 0;
            return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
        }

        // ── Radar Chart SVG ──────────────────────────────────────────────────
        function renderRadarSVG(agents) {
            const names = ['pressure', 'structure', 'behavior', 'anomaly', 'cycle'];
            const labels = ['Pressure', 'Structure', 'Behavior', 'Anomaly', 'Cycle'];
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#CC44FF', '#5B8CFF'];
            const cx = 140, cy = 120, maxR = 90;
            const n = 5;
            const angleStep = (2 * Math.PI) / n;
            const startAngle = -Math.PI / 2;

            let gridLines = '';
            [20, 40, 60, 80, 100].forEach(pct => {
                const r = (pct / 100) * maxR;
                let pts = '';
                for (let i = 0; i < n; i++) {
                    const a = startAngle + i * angleStep;
                    pts += `${cx + r * Math.cos(a)},${cy + r * Math.sin(a)} `;
                }
                gridLines += `<polygon points="${pts.trim()}" class="radar-grid"/>`;
            });

            // Axis lines
            let axes = '';
            for (let i = 0; i < n; i++) {
                const a = startAngle + i * angleStep;
                axes += `<line x1="${cx}" y1="${cy}" x2="${cx + maxR * Math.cos(a)}" y2="${cy + maxR * Math.sin(a)}" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>`;
            }

            // Data shape
            const scores = names.map(name => {
                const agent = agents.find(a => a.name === name);
                return agent ? agent.score : 50;
            });

            let shapePts = '';
            let dots = '';
            let labelEls = '';
            for (let i = 0; i < n; i++) {
                const a = startAngle + i * angleStep;
                const r = (scores[i] / 100) * maxR;
                const x = cx + r * Math.cos(a);
                const y = cy + r * Math.sin(a);
                shapePts += `${x},${y} `;
                dots += `<circle cx="${x}" cy="${y}" r="4" class="radar-dot" fill="${colors[i]}"/>`;

                // Labels
                const lx = cx + (maxR + 18) * Math.cos(a);
                const ly = cy + (maxR + 18) * Math.sin(a);
                const anchor = Math.abs(Math.cos(a)) < 0.1 ? 'middle' : Math.cos(a) > 0 ? 'start' : 'end';
                labelEls += `<text x="${lx}" y="${ly + 4}" text-anchor="${anchor}" class="radar-label" fill="${colors[i]}">${labels[i]}</text>`;
                labelEls += `<text x="${lx}" y="${ly + 16}" text-anchor="${anchor}" fill="#555577" font-size="10" font-family="JetBrains Mono">${scores[i].toFixed(0)}</text>`;
            }

            return `
                <svg class="radar-svg" viewBox="0 0 280 260">
                    ${gridLines}
                    ${axes}
                    <polygon points="${shapePts.trim()}" class="radar-shape"/>
                    ${dots}
                    ${labelEls}
                </svg>
            `;
        }

        // ── Agent Cards ──────────────────────────────────────────────────────
        function renderAgentCards(agents) {
            const colors = {
                pressure: '#FF6B6B', structure: '#4ECDC4',
                behavior: '#FFE66D', anomaly: '#CC44FF', cycle: '#5B8CFF'
            };
            const icons = {
                pressure: '💨', structure: '🏗️',
                behavior: '🧠', anomaly: '👁️', cycle: '🔄'
            };

            return agents.map(a => `
                <div class="agent-card">
                    <div style="font-size:20px;margin-bottom:4px">${icons[a.name] || '🔹'}</div>
                    <div class="agent-name">${a.name}</div>
                    <div class="agent-score" style="color:${colors[a.name] || '#888'}">${a.score?.toFixed(1)}</div>
                    <div class="agent-bar">
                        <div class="agent-bar-fill" style="width:${a.score}%;background:${colors[a.name]}"></div>
                    </div>
                    <div class="agent-thesis">${a.thesis?.substring(0, 80) || '—'}${a.thesis?.length > 80 ? '...' : ''}</div>
                </div>
            `).join('');
        }

        // ── Risk Bars ────────────────────────────────────────────────────────
        function renderRiskBars(risk) {
            const items = [
                { key: 'expansion', label: 'Expansion', color: '#44BB77' },
                { key: 'reversal', label: 'Reversal', color: '#FF3030' },
                { key: 'squeeze', label: 'Squeeze', color: '#5B8CFF' },
                { key: 'trap', label: 'Trap', color: '#FF6600' },
                { key: 'regime_break', label: 'Regime Break', color: '#FF0080' },
            ];

            return items.map(item => {
                const val = (risk[item.key] || 0) * 100;
                return `
                    <div class="risk-bar-wrap">
                        <span class="risk-label">${item.label}</span>
                        <div class="risk-track">
                            <div class="risk-fill" style="width:${val}%;background:${item.color}"></div>
                        </div>
                        <span class="risk-pct" style="color:${item.color}">${val.toFixed(0)}%</span>
                    </div>
                `;
            }).join('');
        }

        // ── Trigger Map ──────────────────────────────────────────────────────
        function renderTriggerMap(tm) {
            let items = '';
            
            if (tm.confirm_above) {
                items += `
                    <div class="trigger-item">
                        <div class="trigger-icon" style="background:rgba(0,255,136,0.1)">🎯</div>
                        <span class="trigger-text">Confirm above</span>
                        <span class="trigger-value" style="color:#00FF88">$${tm.confirm_above?.toFixed(2)}</span>
                    </div>
                `;
            }

            if (tm.invalidate_below) {
                items += `
                    <div class="trigger-item">
                        <div class="trigger-icon" style="background:rgba(255,48,48,0.1)">🚫</div>
                        <span class="trigger-text">Invalidate below</span>
                        <span class="trigger-value" style="color:#FF3030">$${tm.invalidate_below?.toFixed(2)}</span>
                    </div>
                `;
            }

            if (tm.time_limit_bars) {
                items += `
                    <div class="trigger-item">
                        <div class="trigger-icon" style="background:rgba(255,215,0,0.1)">⏰</div>
                        <span class="trigger-text">Time limit</span>
                        <span class="trigger-value" style="color:#FFD700">${tm.time_limit_bars} bars</span>
                    </div>
                `;
            }

            if (tm.conditions?.length) {
                tm.conditions.forEach(c => {
                    items += `
                        <div class="trigger-item">
                            <div class="trigger-icon" style="background:rgba(91,140,255,0.1)">⚡</div>
                            <span class="trigger-text">${c}</span>
                        </div>
                    `;
                });
            }

            return items || '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">No active triggers</div>';
        }

        // ── Debate Log ───────────────────────────────────────────────────────
        function renderDebateLog(agents, data) {
            let log = '';
            const biasWord = (data.bias || 'neutral').includes('bullish') ? 'BULLISH' : 
                             (data.bias || 'neutral').includes('bearish') ? 'BEARISH' : 'NEUTRAL';

            agents.forEach(a => {
                const vote = a.score > 55 ? 'BULLISH' : a.score < 45 ? 'BEARISH' : 'NEUTRAL';
                const agrees = vote === biasWord;
                log += `<div><span class="debate-agent">${a.name.toUpperCase()}</span> votes <span class="debate-vote ${agrees ? 'agree' : 'disagree'}">${vote}</span> (${a.score?.toFixed(0)}) — conf ${(a.confidence * 100)?.toFixed(0)}%</div>`;
                
                if (a.contradictions?.length) {
                    a.contradictions.forEach(c => {
                        log += `<div style="padding-left:16px;color:#FF6B6B;font-size:11px">⚠ ${c}</div>`;
                    });
                }
            });

            log += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)">`;
            log += `<span style="color:#CC44FF">VERDICT:</span> <span style="color:${COLORS[data.bias] || '#888'}">${biasWord}</span> `;
            log += `| Stability: <span style="color:${COLORS[data.stability] || '#888'}">${(data.stability || '').toUpperCase()}</span>`;
            log += `</div>`;

            return log;
        }

        // ── Timeline ─────────────────────────────────────────────────────────
        function renderTimeline(history) {
            const panel = document.getElementById('timelinePanel');
            const container = document.getElementById('timelineContainer');
            if (!panel || !container || !history.length) return;

            panel.style.display = '';
            const maxScore = 100;
            const bars = history.map(h => {
                const pct = (h.veil_score / maxScore) * 100;
                const color = COLORS[h.state] || COLORS.dormant;
                const time = formatTime(h.scanned_at);
                return `<div class="timeline-bar" style="height:${pct}%;background:${color}" data-tooltip="${h.state?.toUpperCase()} — ${h.veil_score?.toFixed(1)} — ${time}"></div>`;
            }).join('');

            container.innerHTML = `<div class="timeline-chart">${bars}</div>`;
        }

        // ── Util ─────────────────────────────────────────────────────────────
        function formatTime(ts) {
            if (!ts) return '—';
            const d = new Date(ts);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
    </script>
