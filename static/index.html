<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS — Trade Command Center | ScriptMasterLabs</title>
    <meta name="description" content="ARGUS Trade Command Center — The organism tells you what to trade. You decide if you pull the trigger.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #06060E;
            --bg-secondary: #0D0D1A;
            --bg-card: #111128;
            --bg-card-hover: #16163A;
            --border: rgba(255, 255, 255, 0.06);
            --border-active: rgba(204, 68, 255, 0.3);
            --text-primary: #E8E8F0;
            --text-secondary: #8888AA;
            --text-muted: #555577;
            --accent: #CC44FF;
            --accent2: #5B8CFF;
            --green: #00FF88;
            --amber: #FFD700;
            --red: #FF3030;
            --orange: #FF6600;
            --pink: #FF0080;
            --violet: #CC44FF;
            --blue: #5B8CFF;
            --font: 'Inter', -apple-system, sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --radius: 12px;
            --radius-lg: 16px;
        }

        body { font-family: var(--font); background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

        .ambient { position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(204,68,255,0.04) 0%, transparent 60%),
                        radial-gradient(ellipse 50% 50% at 80% 90%, rgba(91,140,255,0.03) 0%, transparent 50%);
        }

        .scan-lines { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.012;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
        }

        .app { position: relative; z-index: 2; max-width: 1400px; margin: 0 auto; }

        /* ── Header ─────────────────────────────────────────────────────── */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); }
        .header-brand { display: flex; align-items: center; gap: 12px; }
        .logo-mark { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; animation: pulse 3s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(204,68,255,0.3); } 50% { box-shadow: 0 0 20px 4px rgba(204,68,255,0.15); } }
        .logo-text { font-weight: 800; font-size: 18px; letter-spacing: 2px; }
        .logo-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; }
        .status { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 2s ease-in-out infinite; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .status-text { font-size: 12px; color: var(--text-secondary); font-family: var(--mono); }

        /* ── Search ─────────────────────────────────────────────────────── */
        .search { padding: 20px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 200px; max-width: 400px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; font-size: 15px; font-family: var(--mono); color: var(--text-primary); outline: none; transition: all 0.2s; text-transform: uppercase; }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(204,68,255,0.15); }
        .search-input::placeholder { color: var(--text-muted); text-transform: none; }

        .btn { padding: 12px 24px; border-radius: var(--radius); font-family: var(--font); font-weight: 600; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-scan { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
        .btn-scan:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(204,68,255,0.3); }
        .btn-scan:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── Directive Hero ─────────────────────────────────────────────── */
        .directive-hero {
            margin: 0 24px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            position: relative;
            overflow: hidden;
        }

        .directive-hero::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .directive-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; flex-wrap: wrap; }

        .directive-action-wrap { flex-shrink: 0; }

        .directive-action {
            font-size: 32px; font-weight: 900; letter-spacing: 1px;
            font-family: var(--mono);
            line-height: 1.1;
        }

        .directive-conviction {
            font-size: 13px; font-weight: 600;
            margin-top: 6px; letter-spacing: 1px;
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 20px;
        }

        .directive-ticker {
            font-size: 14px; color: var(--text-muted); margin-top: 4px;
            letter-spacing: 1px; font-family: var(--mono);
        }

        .directive-headline {
            flex: 1; min-width: 300px;
            font-size: 17px; line-height: 1.6;
            color: var(--text-secondary);
            padding-top: 4px;
        }

        /* ── Levels Grid ────────────────────────────────────────────────── */
        .levels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .level-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            text-align: center;
        }

        .level-label {
            font-size: 10px; color: var(--text-muted);
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 6px;
        }

        .level-value {
            font-size: 22px; font-weight: 700;
            font-family: var(--mono);
        }

        .level-value.green { color: var(--green); }
        .level-value.red { color: var(--red); }
        .level-value.amber { color: var(--amber); }
        .level-value.blue { color: var(--blue); }
        .level-value.muted { color: var(--text-muted); }

        /* ── Reasoning + Risk Row ───────────────────────────────────────── */
        .detail-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 0 24px 16px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: border-color 0.3s;
        }
        .card:hover { border-color: var(--border-active); }

        .card-title {
            font-size: 11px; font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }

        .reasoning-text {
            font-size: 14px; line-height: 1.8;
            color: var(--text-secondary);
        }

        /* ── Risk Panel ─────────────────────────────────────────────────── */
        .risk-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 20px; font-weight: 800;
            font-family: var(--mono);
            margin-bottom: 12px;
        }

        .risk-note {
            font-size: 13px; line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        .size-rec {
            display: flex; align-items: center; gap: 10px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 12px 16px;
        }

        .size-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
        .size-value { font-size: 16px; font-weight: 700; font-family: var(--mono); margin-left: auto; }

        /* ── Watch / Kill Lists ──────────────────────────────────────────── */
        .list-item {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 6px 0; font-size: 13px;
            color: var(--text-secondary);
        }
        .list-icon { flex-shrink: 0; font-size: 12px; margin-top: 2px; }

        /* ── Agent + Score Row ───────────────────────────────────────────── */
        .bottom-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            padding: 0 24px 16px;
        }

        .agent-strip {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .agent-mini {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 10px;
            text-align: center;
            transition: all 0.3s;
        }
        .agent-mini:hover { border-color: var(--border-active); transform: translateY(-2px); }
        .agent-mini-name { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
        .agent-mini-score { font-size: 22px; font-weight: 800; font-family: var(--mono); }
        .agent-mini-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .agent-mini-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.22,1,0.36,1); }

        /* ── Score Summary ──────────────────────────────────────────────── */
        .score-summary {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        }

        .veil-number {
            font-size: 56px; font-weight: 900;
            font-family: var(--mono);
            background: linear-gradient(135deg, var(--accent), var(--text-primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1;
        }

        .veil-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; }
        
        .state-badge {
            font-size: 12px; font-weight: 700;
            padding: 4px 14px; border-radius: 20px;
            letter-spacing: 1px;
        }

        /* ── Risk Bars ──────────────────────────────────────────────────── */
        .risk-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .risk-bar-label { font-size: 10px; color: var(--text-muted); width: 70px; text-align: right; font-family: var(--mono); text-transform: uppercase; }
        .risk-bar-track { flex: 1; height: 4px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; }
        .risk-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.22,1,0.36,1); }
        .risk-bar-pct { font-size: 10px; color: var(--text-muted); width: 35px; font-family: var(--mono); }

        /* ── Empty State ────────────────────────────────────────────────── */
        .empty { text-align: center; padding: 100px 20px; }
        .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.3; }
        .empty-title { font-size: 24px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }
        .empty-sub { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

        /* ── Scanning Overlay ───────────────────────────────────────────── */
        .overlay { position: fixed; inset: 0; z-index: 200; background: rgba(6,6,14,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .overlay-ring { width: 48px; height: 48px; border: 3px solid transparent; border-top-color: var(--accent); border-right-color: var(--accent2); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .overlay-text { font-size: 14px; color: var(--text-secondary); margin-top: 16px; font-family: var(--mono); letter-spacing: 2px; }

        /* ── Footer ─────────────────────────────────────────────────────── */
        .footer { padding: 20px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
        .footer-text { font-size: 11px; color: var(--text-muted); }

        /* ── Animations ─────────────────────────────────────────────────── */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .anim { animation: fadeUp 0.4s ease-out forwards; opacity: 0; }
        .d1 { animation-delay: 0.05s; } .d2 { animation-delay: 0.1s; } .d3 { animation-delay: 0.15s; } .d4 { animation-delay: 0.2s; } .d5 { animation-delay: 0.25s; }

        /* ── Responsive ─────────────────────────────────────────────────── */
        @media (max-width: 900px) {
            .detail-row, .bottom-row { grid-template-columns: 1fr; }
            .agent-strip { grid-template-columns: repeat(3, 1fr); }
            .directive-top { flex-direction: column; }
            .directive-headline { min-width: auto; }
            .levels-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 600px) {
            .agent-strip { grid-template-columns: repeat(2, 1fr); }
            .levels-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="ambient"></div>
    <div class="scan-lines"></div>

    <div class="app">
        <header class="header">
            <div class="header-brand">
                <div class="logo-mark">⚡</div>
                <div>
                    <div class="logo-text">ARGUS</div>
                    <div class="logo-sub">Trade Command Center</div>
                </div>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                <span class="status-text">ORGANISM ONLINE</span>
            </div>
        </header>

        <div class="search">
            <input type="text" class="search-input" id="tickerInput" placeholder="Enter ticker — AMC, SPY, TSLA..." autocomplete="off" spellcheck="false" maxlength="10">
            <button class="btn btn-scan" id="scanBtn" onclick="runDirective()">⚡ SCAN</button>
        </div>

        <div id="content">
            <div class="empty">
                <div class="empty-icon">👁️</div>
                <div class="empty-title">ARGUS is the brain. You are the hands.</div>
                <div class="empty-sub">Enter a ticker. The organism will tell you what to do.<br>You decide if you pull the trigger.</div>
            </div>
        </div>

        <footer class="footer">
            <span class="footer-text">SML ARGUS v0.2.1 — Trade Directive Engine</span>
            <span class="footer-text">© ScriptMasterLabs</span>
        </footer>
    </div>

    <div class="overlay" id="overlay" style="display:none;">
        <div class="overlay-ring"></div>
        <div class="overlay-text" id="overlayText">SCANNING...</div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        let scanning = false;

        $('tickerInput').addEventListener('keydown', e => { if (e.key === 'Enter') runDirective(); });

        async function runDirective() {
            const ticker = $('tickerInput').value.trim().toUpperCase();
            if (!ticker || scanning) return;
            scanning = true;

            // Show overlay
            $('overlay').style.display = 'flex';
            let dots = 0;
            const phases = [
                `ANALYZING ${ticker} MARKET DATA`,
                'RUNNING 5-AGENT INTELLIGENCE',
                'DEBATE ENGINE RESOLVING',
                'GENERATING TRADE DIRECTIVE',
            ];
            let phase = 0;
            const iv = setInterval(() => {
                dots = (dots + 1) % 4;
                $('overlayText').textContent = phases[phase % phases.length] + '.'.repeat(dots);
                if (dots === 0) phase++;
            }, 350);

            try {
                const resp = await fetch('/directive', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticker, timeframes: ['15m', '1h', '1d'] }),
                });
                if (!resp.ok) throw new Error(`Failed: ${resp.status}`);
                const d = await resp.json();
                renderDirective(d);
            } catch (err) {
                $('content').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Scan Failed</div><div class="empty-sub">${err.message}</div></div>`;
            } finally {
                clearInterval(iv);
                $('overlay').style.display = 'none';
                scanning = false;
            }
        }

        function renderDirective(d) {
            const COLORS = {
                bullish: '#00FF88', unstable_bullish: '#FFD700', bearish: '#FF3030',
                unstable_bearish: '#FF6600', neutral: '#8888AA', fractured: '#CC44FF',
                stable: '#00FF88', fragile: '#FFD700', distorted: '#CC44FF', breaking: '#FF3030',
            };
            const stateColor = COLORS[d.state] || '#555577';
            const biasColor = COLORS[d.bias] || '#8888AA';
            const riskColors = { LOW: '#00FF88', MODERATE: '#FFD700', HIGH: '#FF6600', EXTREME: '#FF3030' };
            const riskColor = riskColors[d.risk_grade] || '#888';
            const convictionColor = d.conviction === 'HIGH CONVICTION' ? '#00FF88' : d.conviction === 'MODERATE' ? '#FFD700' : d.conviction === 'LOW' ? '#FF6600' : '#555577';
            const sizeColors = { FULL: '#00FF88', HALF: '#FFD700', QUARTER: '#FF6600', SKIP: '#555577' };

            $('content').innerHTML = `
                <!-- ═══ THE CALL ═══ -->
                <div class="directive-hero anim d1" style="border-color: ${d.action_color}33">
                    <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${d.action_color};border-radius:16px 16px 0 0"></div>
                    <div class="directive-top">
                        <div class="directive-action-wrap">
                            <div class="directive-action" style="color:${d.action_color}">${d.action}</div>
                            <div class="directive-conviction" style="background:${convictionColor}18;color:${convictionColor}">
                                <span style="font-size:16px">●</span> ${d.conviction} ${d.conviction_pct > 0 ? `— ${d.conviction_pct}%` : ''}
                            </div>
                            <div class="directive-ticker">${d.ticker} · ${new Date(d.scanned_at).toLocaleTimeString()}</div>
                        </div>
                        <div class="directive-headline">${d.headline}</div>
                    </div>

                    <!-- Levels -->
                    <div class="levels-grid">
                        ${d.entry_above ? `<div class="level-box"><div class="level-label">Entry Above</div><div class="level-value green">$${d.entry_above.toFixed(2)}</div></div>` : ''}
                        ${d.stop_loss ? `<div class="level-box"><div class="level-label">Stop Loss</div><div class="level-value red">$${d.stop_loss.toFixed(2)}</div></div>` : ''}
                        ${d.target_1 ? `<div class="level-box"><div class="level-label">Target 1</div><div class="level-value amber">$${d.target_1.toFixed(2)}</div></div>` : ''}
                        ${d.target_2 ? `<div class="level-box"><div class="level-label">Target 2</div><div class="level-value blue">$${d.target_2.toFixed(2)}</div></div>` : ''}
                        <div class="level-box">
                            <div class="level-label">Risk Grade</div>
                            <div class="level-value" style="color:${riskColor}">${d.risk_emoji} ${d.risk_grade}</div>
                        </div>
                        <div class="level-box">
                            <div class="level-label">Position Size</div>
                            <div class="level-value" style="color:${sizeColors[d.position_size] || '#888'}">${d.position_size}</div>
                        </div>
                    </div>
                </div>

                <!-- ═══ WHY + RISK ═══ -->
                <div class="detail-row">
                    <div class="card anim d2">
                        <div class="card-title">💡 Why This Call</div>
                        <div class="reasoning-text">${d.reasoning}</div>
                        ${d.watch_for.length ? `
                            <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
                                <div class="card-title">👀 Watch For</div>
                                ${d.watch_for.map(w => `<div class="list-item"><span class="list-icon">▸</span>${w}</div>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                    <div class="card anim d3">
                        <div class="card-title">⚠️ Risk Assessment</div>
                        <div class="risk-badge" style="color:${riskColor}">${d.risk_emoji} ${d.risk_grade} RISK</div>
                        <div class="risk-note">${d.risk_note}</div>
                        <div class="size-rec">
                            <div>
                                <div class="size-label">Recommended Size</div>
                            </div>
                            <div class="size-value" style="color:${sizeColors[d.position_size] || '#888'}">${d.position_size}</div>
                        </div>
                        ${d.kill_conditions.length ? `
                            <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
                                <div class="card-title">🚫 Kill Conditions</div>
                                ${d.kill_conditions.map(k => `<div class="list-item"><span class="list-icon" style="color:var(--red)">✕</span>${k}</div>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>

                <!-- ═══ AGENTS + SCORE ═══ -->
                <div class="bottom-row">
                    <div class="card anim d4">
                        <div class="card-title">🧠 Agent Intelligence (what the organism sees)</div>
                        <div class="agent-strip" id="agentStrip"></div>
                    </div>
                    <div class="card anim d5">
                        <div class="score-summary">
                            <div class="veil-label">Veil Score</div>
                            <div class="veil-number">${d.veil_score.toFixed(1)}</div>
                            <div class="state-badge" style="background:${stateColor}22;color:${stateColor}">${d.state.toUpperCase().replace('_',' ')}</div>
                            <div style="margin-top:8px;width:100%">
                                <div class="risk-bar-row"><span class="risk-bar-label">Bias</span><div style="font-size:12px;font-family:var(--mono);color:${biasColor}">${d.bias.replace('_',' ').toUpperCase()}</div></div>
                                <div class="risk-bar-row"><span class="risk-bar-label">Stability</span><div style="font-size:12px;font-family:var(--mono);color:${COLORS[d.stability] || '#888'}">${d.stability.toUpperCase()}</div></div>
                                <div class="risk-bar-row"><span class="risk-bar-label">Top Risk</span><div style="font-size:12px;font-family:var(--mono);color:var(--orange)">${d.dominant_risk.replace('_',' ').toUpperCase()}</div></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Populate agent strip from the scan data we stored
            loadAgents(d.ticker);
        }

        // Load agent details from a quick scan check
        async function loadAgents(ticker) {
            const strip = document.getElementById('agentStrip');
            if (!strip) return;

            try {
                const resp = await fetch(`/chart/${ticker}`);
                if (!resp.ok) return;
                const chart = await resp.json();

                const agents = [
                    { name: 'Pressure', score: chart.agent_pressure, color: '#FF6B6B', icon: '💨' },
                    { name: 'Structure', score: chart.agent_structure, color: '#4ECDC4', icon: '🏗️' },
                    { name: 'Behavior', score: chart.agent_behavior, color: '#FFE66D', icon: '🧠' },
                    { name: 'Anomaly', score: chart.agent_anomaly, color: '#CC44FF', icon: '👁️' },
                    { name: 'Cycle', score: chart.agent_cycle, color: '#5B8CFF', icon: '🔄' },
                ];

                strip.innerHTML = agents.map(a => `
                    <div class="agent-mini">
                        <div style="font-size:16px">${a.icon}</div>
                        <div class="agent-mini-name">${a.name}</div>
                        <div class="agent-mini-score" style="color:${a.color}">${a.score.toFixed(0)}</div>
                        <div class="agent-mini-bar"><div class="agent-mini-fill" style="width:${a.score}%;background:${a.color}"></div></div>
                    </div>
                `).join('');
            } catch (e) {
                strip.innerHTML = '<div style="color:var(--text-muted);font-size:12px;grid-column:1/-1;text-align:center">Agent data loading...</div>';
            }
        }
    </script>
</body>
</html>
